spring:
  application:
    name: blog

  datasource:
    url: jdbc:postgresql://localhost:5432/blogdb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    user:
      name: admin
      password: admin

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml